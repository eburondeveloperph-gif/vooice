<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Video Panel</title>
    <style>
        /* Base Reset & Typography */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #171719; 
            color: #ffffff;
            overflow: hidden;
        }

        /* Layout Structure */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* =========================================
           LEFT PANEL STRUCTURE
           ========================================= */
        .left-panel {
            flex: 1;
            position: relative;
            background-color: #121214;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* --- SKELETON LOADING UI (Only on Left) --- */
        #left-skeleton {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            background-color: #121214;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            transition: opacity 0.5s ease;
        }

        /* Shimmer Animation */
        .shimmer {
            background: linear-gradient(90deg, #202124 25%, #3c4043 50%, #202124 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 1.5s infinite linear;
            border-radius: 8px;
        }

        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Skeleton Left Elements */
        .skel-header-text { width: 300px; height: 32px; margin-bottom: 30px; align-self: flex-start; margin-left: 5%; }
        .skel-video-box { width: 90%; max-width: 900px; aspect-ratio: 16 / 9; border-radius: 12px; }

        /* --- ACTUAL VIDEO CONTENT (Hidden initially) --- */
        #left-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 0; /* Starts hidden, fades in */
            transition: opacity 0.5s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .video-header {
            width: 90%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .video-header h1 {
            font-size: 1.8rem;
            color: #e8eaed;
            font-weight: 500;
        }

        .video-wrapper {
            position: relative;
            width: 90%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid #3c4043;
        }

        #main-video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* Video Controls Overlay */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 40px 20px 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .video-wrapper:hover .custom-controls {
            transform: translateY(0);
        }

        .control-btn {
            background: none;
            border: none;
            color: #e8eaed;
            font-size: 18px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #8ab4f8;
        }

        /* Range Sliders */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 6px;
            background: #5f6368;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #8ab4f8;
            margin-top: -4px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        #seek-bar { flex: 1; }
        #volume-bar { width: 80px; }

        .time-display {
            font-size: 13px;
            color: #9aa0a6;
            font-variant-numeric: tabular-nums;
            min-width: 90px;
            text-align: center;
        }

        /* =========================================
           RIGHT PANEL (Static, Always Visible)
           ========================================= */
        .right-panel {
            width: 380px;
            background-color: #202124;
            border-left: 1px solid #3c4043;
            display: flex;
            flex-direction: column;
            z-index: 30;
        }
        .rp-header {
            padding: 24px;
            font-size: 1.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3c4043;
        }
        .close-icon { color: #9aa0a6; cursor: pointer; font-size: 1.2rem; }
        .rp-content { padding: 24px; flex: 1; overflow-y: auto; }
        .setting-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            color: #9aa0a6;
            font-family: monospace;
            font-size: 14px;
        }
        .checkbox {
            width: 18px;
            height: 18px;
            background-color: #8ab4f8;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .checkbox::after {
            content: '✓'; color: #202124; font-size: 12px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- LEFT PANEL (Contains Loading & Video) -->
        <div class="left-panel">
            
            <!-- 1. SKELETON LOADING (Only inside left panel) -->
            <div id="left-skeleton">
                <div class="shimmer skel-header-text"></div>
                <div class="shimmer skel-video-box"></div>
            </div>

            <!-- 2. ACTUAL VIDEO COMPONENT (Hidden initially) -->
            <div id="left-content">
                <div class="video-header">
                    <h1>Generated Video Output</h1>
                </div>

                <div class="video-wrapper">
                    <!-- Standard placeholder video for demonstration -->
                    <video id="main-video" src="https://www.w3schools.com/html/mov_bbb.mp4" playsinline></video>
                    
                    <!-- Custom Player Controls -->
                    <div class="custom-controls">
                        <button id="play-btn" class="control-btn" title="Play/Pause">&#9658;</button>
                        
                        <input type="range" id="seek-bar" value="0" step="0.1">
                        
                        <div class="time-display">
                            <span id="current-time">0:00</span> / <span id="duration">0:00</span>
                        </div>
                        
                        <button id="mute-btn" class="control-btn" title="Mute/Unmute">&#128266;</button>
                        <input type="range" id="volume-bar" min="0" max="1" step="0.05" value="1" title="Volume">
                        
                        <button id="fullscreen-btn" class="control-btn" title="Fullscreen">&#x26F6;</button>
                    </div>
                </div>
            </div>
            
        </div>

        <!-- RIGHT PANEL (Static & always visible) -->
        <div class="right-panel">
            <div class="rp-header">
                <span>Settings</span>
                <span class="close-icon">&#10005;</span>
            </div>
            <div class="rp-content">
                <div class="setting-item"><div class="checkbox"></div> gmail_list_messages</div>
                <div class="setting-item"><div class="checkbox"></div> gmail_get_message</div>
                <div class="setting-item"><div class="checkbox"></div> gmail_send_email</div>
                <div class="setting-item"><div class="checkbox"></div> gmail_delete_message</div>
                <div class="setting-item"><div class="checkbox"></div> drive_list_files</div>
                <div class="setting-item"><div class="checkbox"></div> drive_create_file</div>
                <div class="setting-item"><div class="checkbox"></div> sheets_create</div>
                <div class="setting-item"><div class="checkbox"></div> slides_create</div>
                <div class="setting-item"><div class="checkbox"></div> slides_add_slide</div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // --- 1. Loading Simulation Logic ---
        window.addEventListener('DOMContentLoaded', () => {
            const leftSkeleton = document.getElementById('left-skeleton');
            const leftContent = document.getElementById('left-content');

            // Simulate a 3-second network fetch/load time ONLY for the left side
            setTimeout(() => {
                leftSkeleton.style.opacity = '0';
                setTimeout(() => {
                    leftSkeleton.style.display = 'none';
                    leftContent.style.opacity = '1';
                }, 500);
            }, 3000); 
        });

        // --- 2. Custom Video Player Logic ---
        const video = document.getElementById('main-video');
        const playBtn = document.getElementById('play-btn');
        const seekBar = document.getElementById('seek-bar');
        const muteBtn = document.getElementById('mute-btn');
        const volumeBar = document.getElementById('volume-bar');
        const currentTimeText = document.getElementById('current-time');
        const durationText = document.getElementById('duration');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const videoWrapper = document.querySelector('.video-wrapper');

        // Play / Pause Toggle
        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.innerHTML = '&#10074;&#10074;'; // Pause icon (||)
            } else {
                video.pause();
                playBtn.innerHTML = '&#9658;'; // Play icon (>)
            }
        }
        playBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay); // Allow clicking video to pause/play

        // Format Time (seconds to M:SS)
        function formatTime(timeInSeconds) {
            if (isNaN(timeInSeconds)) return "0:00";
            const minutes = Math.floor(timeInSeconds / 60);
            const seconds = Math.floor(timeInSeconds % 60);
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        // Update Metadata (Duration) once video loads
        video.addEventListener('loadedmetadata', () => {
            durationText.textContent = formatTime(video.duration);
        });

        // Update Time & Seek Bar Progress
        video.addEventListener('timeupdate', () => {
            const percentage = (video.currentTime / video.duration) * 100;
            seekBar.value = percentage;
            currentTimeText.textContent = formatTime(video.currentTime);
            
            // Update duration just in case it wasn't captured initially
            if (durationText.textContent === "0:00") {
                durationText.textContent = formatTime(video.duration);
            }
        });

        // Seek Video
        seekBar.addEventListener('input', () => {
            const newTime = (seekBar.value / 100) * video.duration;
            video.currentTime = newTime;
        });

        // Mute / Unmute Toggle
        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            if (video.muted || video.volume === 0) {
                muteBtn.innerHTML = '&#128263;'; // Muted icon
                volumeBar.value = 0;
            } else {
                muteBtn.innerHTML = '&#128266;'; // Unmuted icon
                volumeBar.value = video.volume || 1;
            }
        });

        // Update Volume
        volumeBar.addEventListener('input', () => {
            video.volume = volumeBar.value;
            video.muted = video.volume == 0;
            muteBtn.innerHTML = video.muted ? '&#128263;' : '&#128266;';
        });

        // Fullscreen Toggle
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (videoWrapper.requestFullscreen) {
                    videoWrapper.requestFullscreen();
                } else if (videoWrapper.webkitRequestFullscreen) { /* Safari */
                    videoWrapper.webkitRequestFullscreen();
                } else if (videoWrapper.msRequestFullscreen) { /* IE11 */
                    videoWrapper.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
